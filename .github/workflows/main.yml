name: Compilador Mac OS - TrataDoc

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Baixar os arquivos do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar as Bibliotecas do TrataDoc
      run: |
        python -m pip install --upgrade pip
        pip install pymupdf pytesseract spacy customtkinter opencv-python Pillow numpy pyinstaller

    - name: Empacotar o App com PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon="icone.icns" --name "TrataDoc" --add-data "pt_core_news_md:pt_core_news_md/" --add-data "haarcascade_frontalface_default.xml:." --add-data "icone.png:." "TrataDoc.py"

    - name: Zipar o App (Obrigatório para o Mac não corromper o arquivo)
      run: |
        cd dist
        zip -r TrataDoc_Mac.zip TrataDoc.app

    - name: Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: TrataDoc-MacOS
        path: dist/TrataDoc_Mac.zip
