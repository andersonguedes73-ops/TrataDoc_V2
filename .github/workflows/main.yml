name: Compilador Mac OS - TrataDoc

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Baixar os arquivos do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar as Bibliotecas do TrataDoc
      run: |
        python -m pip install --upgrade pip
        pip install pymupdf pytesseract spacy customtkinter opencv-python Pillow numpy pyinstaller

    - name: Baixar a IA de Texto (SpaCy) automaticamente
      run: |
        python -m spacy download pt_core_news_md
        python -c "import pt_core_news_md, shutil, os; shutil.copytree(os.path.dirname(pt_core_news_md.__file__), 'pt_core_news_md')"

    - name: Empacotar o App com PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon="icone.icns" --name "TrataDoc" --add-data "pt_core_news_md:pt_core_news_md/" --add-data "haarcascade_frontalface_default.xml:." --add-data "icone.png:." "TrataDoc.py"

    - name: Instalar ferramenta de DMG
      run: brew install create-dmg

    - name: Criar Instalador DMG (Profissional)
      run: |
        mkdir -p dist/dmg
        create-dmg \
          --volname "Instalador TrataDoc" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TrataDoc.app" 175 190 \
          --hide-extension "TrataDoc.app" \
          --app-drop-link 425 190 \
          "dist/TrataDoc_v9_Mac.dmg" \
          "dist/TrataDoc.app"

    - name: Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: TrataDoc-MacOS-Installer
        path: dist/TrataDoc_v9_Mac.dmg
